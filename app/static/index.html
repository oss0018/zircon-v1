<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zircon FRT — OSINT Portal</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <!-- CDN Dependencies -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <!-- JS Modules -->
  <script src="/static/js/i18n.js"></script>
  <script src="/static/js/app.js"></script>
  <script src="/static/js/dashboard.js"></script>
  <script src="/static/js/search.js"></script>
  <script src="/static/js/files.js"></script>
  <script src="/static/js/cve.js"></script>
  <script src="/static/js/integrations.js"></script>
  <script src="/static/js/monitoring.js"></script>
  <script src="/static/js/brand_protection.js"></script>
  <script src="/static/js/settings.js"></script>
  <script src="/static/js/deep_search.js"></script>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Main App -->
  <div id="app" x-data="zirconApp" x-cloak>

    <!-- ── LOGIN PAGE ─────────────────────────────────────────────── -->
    <div x-show="!authenticated" class="login-page" style="width:100%;flex-direction:column;">
      <div class="login-card">
        <div class="login-logo">
          <h1>⬡ ZIRCON</h1>
          <p>FRT · OSINT Intelligence Portal</p>
        </div>

        <div x-show="loginError" class="alert alert-error" x-text="loginError"></div>

        <div class="form-group">
          <label class="form-label" x-text="t('username')"></label>
          <input class="form-input" type="text" x-model="loginForm.username"
                 :placeholder="t('username')" @keyup.enter="login()" autocomplete="username" />
        </div>

        <div class="form-group">
          <label class="form-label" x-text="t('password')"></label>
          <input class="form-input" type="password" x-model="loginForm.password"
                 :placeholder="t('password')" @keyup.enter="login()" autocomplete="current-password" />
        </div>

        <button class="btn btn-primary" style="width:100%;justify-content:center;"
                @click="login()" :disabled="loginLoading">
          <span x-show="loginLoading" class="spinner" style="width:16px;height:16px;"></span>
          <span x-text="loginLoading ? t('loading') : t('login_btn')"></span>
        </button>

        <!-- Language switcher -->
        <div style="display:flex;gap:8px;justify-content:center;margin-top:20px;">
          <button class="btn btn-sm btn-secondary" @click="setLang('en')"
                  :style="lang === 'en' ? 'border-color: var(--accent-green); color: var(--accent-green)' : ''">EN</button>
          <button class="btn btn-sm btn-secondary" @click="setLang('ru')"
                  :style="lang === 'ru' ? 'border-color: var(--accent-green); color: var(--accent-green)' : ''">RU</button>
          <button class="btn btn-sm btn-secondary" @click="setLang('uk')"
                  :style="lang === 'uk' ? 'border-color: var(--accent-green); color: var(--accent-green)' : ''">UA</button>
        </div>
      </div>
    </div>

    <!-- ── MAIN LAYOUT ───────────────────────────────────────────── -->
    <template x-if="authenticated">
      <div style="display:flex;width:100%;height:100vh;">

        <!-- ── SIDEBAR ─────────────────────────────────────────── -->
        <aside class="sidebar">
          <div class="sidebar-logo">
            <h1>⬡ ZIRCON FRT</h1>
            <p>OSINT Intelligence Portal</p>
          </div>

          <nav class="sidebar-nav">
            <div class="nav-section">Intelligence</div>

            <div class="nav-item" :class="page === 'dashboard' ? 'active' : ''" @click="navigate('dashboard'); loadStats()">
              <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
              <span x-text="t('dashboard')"></span>
            </div>

            <div class="nav-item" :class="page === 'search' ? 'active' : ''" @click="navigate('search')">
              <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
              <span x-text="t('search')"></span>
            </div>

            <div class="nav-item" :class="page === 'cve' ? 'active' : ''" @click="navigate('cve')">
              <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
              </svg>
              <span>CVE Search</span>
            </div>

            <div class="nav-section">OSINT</div>

            <div class="nav-item" :class="page === 'integrations' ? 'active' : ''" @click="navigate('integrations')">
              <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
              <span x-text="t('integrations')"></span>
            </div>

            <div class="nav-item" :class="page === 'watchlist' ? 'active' : ''" @click="navigate('watchlist')">
              <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              <span x-text="t('watchlist')"></span>
            </div>

            <div class="nav-section">Automation</div>

            <div class="nav-item" :class="page === 'monitoring' ? 'active' : ''" @click="navigate('monitoring')">
              <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
              <span x-text="t('monitoring')"></span>
            </div>

            <div class="nav-item" :class="page === 'brands' ? 'active' : ''" @click="navigate('brands')">
              <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
              <span x-text="t('brand_protection')"></span>
            </div>

            <div class="nav-item" :class="page === 'deep-search' ? 'active' : ''" @click="navigate('deep-search')">
              <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/>
              </svg>
              <span>Deep Search</span>
            </div>

            <div class="nav-section">System</div>

            <div class="nav-item" :class="page === 'notifications' ? 'active' : ''" @click="navigate('notifications'); loadStats()">
              <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
              <span x-text="t('notifications')"></span>
              <span class="nav-badge" x-show="unreadCount > 0" x-text="unreadCount"></span>
            </div>

            <div class="nav-item" :class="page === 'settings' ? 'active' : ''" @click="navigate('settings')">
              <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
              <span x-text="t('settings')"></span>
            </div>
          </nav>

          <div class="sidebar-footer">
            <div class="user-info">
              <div class="user-avatar" x-text="userInitials()"></div>
              <div style="flex:1;min-width:0;">
                <div class="user-name" x-text="currentUser?.username"></div>
                <div class="user-role" x-text="currentUser?.role"></div>
              </div>
              <button class="btn btn-sm btn-secondary" @click="logout()" title="Logout" style="padding:4px 8px;">
                <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
              </button>
            </div>
            <!-- Language switcher -->
            <div style="display:flex;gap:6px;margin-top:10px;">
              <button class="btn btn-sm btn-secondary" @click="setLang('en')"
                      :style="lang === 'en' ? 'border-color: var(--accent-green); color: var(--accent-green)' : ''">EN</button>
              <button class="btn btn-sm btn-secondary" @click="setLang('ru')"
                      :style="lang === 'ru' ? 'border-color: var(--accent-green); color: var(--accent-green)' : ''">RU</button>
              <button class="btn btn-sm btn-secondary" @click="setLang('uk')"
                      :style="lang === 'uk' ? 'border-color: var(--accent-green); color: var(--accent-green)' : ''">UA</button>
            </div>
          </div>
        </aside>

        <!-- ── CONTENT AREA ────────────────────────────────────── -->
        <main class="main-content">
          <!-- Topbar -->
          <div class="topbar">
            <div class="topbar-title">
              <span class="pulse" style="margin-right:8px;"></span>
              <span x-text="t(page === 'brands' ? 'brand_protection' : page)"></span>
            </div>
            <div class="topbar-actions">
              <span class="text-muted text-sm" x-text="new Date().toLocaleDateString()"></span>
            </div>
          </div>

          <!-- Page Content -->
          <div class="page-content">

            <!-- ── DASHBOARD ──────────────────────────────────── -->
            <div x-show="page === 'dashboard'" x-data="dashboardPage" x-init="init()">
              <div class="stats-grid">
                <div class="stat-card" @click="navigate('files')" title="View files">
                  <div class="stat-label" x-text="t('total_files')"></div>
                  <div class="stat-value" x-text="stat('total_files')"></div>
                </div>
                <div class="stat-card" @click="navigate('files')" title="View indexed files">
                  <div class="stat-label" x-text="t('indexed_files')"></div>
                  <div class="stat-value text-blue" x-text="stat('indexed_files')"></div>
                </div>
                <div class="stat-card" @click="navigate('search')" title="Go to search">
                  <div class="stat-label" x-text="t('total_searches')"></div>
                  <div class="stat-value" x-text="stat('total_searches')"></div>
                </div>
                <div class="stat-card" @click="navigate('integrations')" title="View integrations">
                  <div class="stat-label" x-text="t('active_integrations')"></div>
                  <div class="stat-value text-blue" x-text="stat('active_integrations')"></div>
                </div>
                <div class="stat-card" @click="navigate('watchlist')" title="View watchlist">
                  <div class="stat-label" x-text="t('watchlist_items')"></div>
                  <div class="stat-value" x-text="stat('watchlist_items')"></div>
                </div>
                <div class="stat-card" @click="navigate('brands')" title="View brand alerts">
                  <div class="stat-label" x-text="t('brand_alerts')"></div>
                  <div class="stat-value text-red" x-text="stat('brand_alerts_new')"></div>
                </div>
                <div class="stat-card" @click="navigate('monitoring')" title="View monitoring jobs">
                  <div class="stat-label" x-text="t('monitoring_jobs')"></div>
                  <div class="stat-value" x-text="stat('active_monitoring_jobs')"></div>
                </div>
                <div class="stat-card" @click="navigate('notifications'); $dispatch('load-stats')" title="View notifications">
                  <div class="stat-label" x-text="t('unread_notifications')"></div>
                  <div class="stat-value text-red" x-text="stat('unread_notifications')"></div>
                </div>
              </div>

              <div class="grid-2" style="gap:20px;">
                <div class="card">
                  <div class="card-title" x-text="t('recent_searches')"></div>
                  <template x-if="stats && stats.recent_searches.length === 0">
                    <p class="text-muted text-sm" x-text="t('no_data')"></p>
                  </template>
                  <template x-for="s in (stats ? stats.recent_searches : [])" :key="s.query + s.created_at">
                    <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border-color);cursor:pointer;"
                         @click="navigate('search')" title="Click to search again">
                      <span class="text-sm truncate text-green" x-text="s.query" style="max-width:200px;"></span>
                      <span class="badge badge-gray" x-text="s.results_count + ' results'"></span>
                    </div>
                  </template>
                </div>

                <div class="card">
                  <div class="card-title" x-text="t('file_types')"></div>
                  <div style="height:200px;display:flex;align-items:center;justify-content:center;">
                    <template x-if="stats && Object.keys(stats.file_types).length > 0">
                      <canvas id="fileTypeChart"></canvas>
                    </template>
                    <template x-if="!stats || Object.keys(stats.file_types || {}).length === 0">
                      <p class="text-muted text-sm" x-text="t('no_data')"></p>
                    </template>
                  </div>
                </div>
              </div>

              <!-- Quick Actions -->
              <div class="card" style="margin-top:20px;">
                <div class="card-title">Quick Actions</div>
                <div class="flex gap-2" style="flex-wrap:wrap;">
                  <button class="btn btn-secondary" @click="reindexAll()" :disabled="reindexing">
                    <span x-show="reindexing" class="spinner" style="width:14px;height:14px;"></span>
                    <span x-text="reindexing ? 'Reindexing...' : 'Reindex All'"></span>
                  </button>
                  <button class="btn btn-secondary" @click="navigate('brands')">Scan All Brands</button>
                  <button class="btn btn-secondary" @click="navigate('search')">View All Searches</button>
                </div>
                <div x-show="reindexMsg" class="alert alert-success" style="margin-top:12px;" x-text="reindexMsg"></div>
              </div>
            </div>

            <!-- ── SEARCH ─────────────────────────────────────── -->
            <div x-show="page === 'search'" x-data="searchPage" x-init="init()">
              <!-- Search Form -->
              <div class="card mb-4">
                <div class="search-bar">
                  <div class="search-input-wrap" style="flex:2;">
                    <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <input class="form-input" type="text" x-model="query"
                           :placeholder="t('search_placeholder')" @keyup.enter="runSearch()" maxlength="512" autocomplete="off" />
                  </div>
                  <select class="form-select" x-model="source" style="width:140px;">
                    <option value="local" x-text="t('search_local')"></option>
                    <option value="osint" x-text="t('search_osint')"></option>
                    <option value="all" x-text="t('search_all')"></option>
                  </select>
                  <select class="form-select" x-model="queryType" style="width:120px;">
                    <template x-for="qt in queryTypes" :key="qt">
                      <option :value="qt" x-text="qt"></option>
                    </template>
                  </select>
                  <button class="btn btn-primary" @click="runSearch()" :disabled="loading">
                    <span x-show="loading" class="spinner" style="width:14px;height:14px;"></span>
                    <span x-text="loading ? t('loading') : t('search_btn')"></span>
                  </button>
                </div>

                <!-- Case-sensitive & limit options -->
                <div class="flex items-center gap-3 mt-2">
                  <label class="flex items-center gap-2 text-sm text-muted" style="cursor:pointer;">
                    <input type="checkbox" x-model="caseSensitive" />
                    Case sensitive
                  </label>
                  <label class="text-sm text-muted">Max results:</label>
                  <select class="form-select" x-model="grepLimit" style="width:100px;">
                    <option value="100">100</option>
                    <option value="200">200</option>
                    <option value="500">500</option>
                    <option value="1000">1000</option>
                    <option value="2000">2000</option>
                  </select>
                </div>

                <!-- Integration Selector -->
                <div x-show="source !== 'local' && integrations.length > 0" style="margin-top:12px;">
                  <div class="form-label" style="margin-bottom:8px;" x-text="t('integrations_to_use')"></div>
                  <div style="display:flex;flex-wrap:wrap;gap:8px;">
                    <template x-for="i in integrations" :key="i.id">
                      <button class="btn btn-sm btn-secondary"
                              :style="selectedIntegrations.includes(i.service_type) ? 'border-color: var(--accent-green); color: var(--accent-green)' : ''"
                              @click="toggleIntegration(i.service_type)"
                              x-text="i.name"></button>
                    </template>
                  </div>
                </div>

                <div style="display:flex;gap:8px;margin-top:12px;">
                  <button class="btn btn-secondary btn-sm" @click="showHistory = !showHistory" x-text="t('search_history')"></button>
                  <button class="btn btn-secondary btn-sm" @click="loadTemplates()" x-text="t('search_templates')"></button>
                  <button class="btn btn-secondary btn-sm" x-show="query" @click="showSaveModal = true">+ Save Template</button>
                </div>
              </div>

              <!-- History -->
              <div x-show="showHistory" class="card mb-4">
                <div class="card-title" x-text="t('search_history')"></div>
                <template x-if="history.length === 0">
                  <p class="text-muted text-sm" x-text="t('no_data')"></p>
                </template>
                <template x-for="h in history" :key="h.id">
                  <div class="flex items-center justify-between" style="padding:6px 0;border-bottom:1px solid var(--border-color);">
                    <span class="text-sm cursor-pointer text-green" @click="useHistoryQuery(h)" x-text="h.query"></span>
                    <div class="flex gap-2">
                      <span class="badge badge-gray" x-text="h.results_count + ' res'"></span>
                      <span class="text-xs text-muted" x-text="formatDate(h.created_at)"></span>
                    </div>
                  </div>
                </template>
              </div>

              <!-- Templates -->
              <div x-show="showTemplates" class="card mb-4">
                <div class="card-title flex justify-between">
                  <span x-text="t('search_templates')"></span>
                </div>
                <template x-if="templates.length === 0">
                  <p class="text-muted text-sm" x-text="t('no_data')"></p>
                </template>
                <template x-for="tmpl in templates" :key="tmpl.id">
                  <div class="flex items-center justify-between" style="padding:6px 0;border-bottom:1px solid var(--border-color);">
                    <span class="text-sm cursor-pointer text-green" @click="loadTemplate(tmpl)" x-text="tmpl.name"></span>
                    <div class="flex gap-2">
                      <span class="text-xs text-muted" x-text="tmpl.query.substring(0, 40)"></span>
                      <button class="btn btn-sm btn-danger" @click="deleteTemplate(tmpl.id)">✕</button>
                    </div>
                  </div>
                </template>
              </div>

              <!-- Results tabs -->
              <div x-show="grepMatches.length > 0 || results.length > 0" style="margin-top:16px;">

                <!-- Tab switcher -->
                <div class="flex gap-2 mb-3" style="border-bottom: 1px solid var(--border-color); padding-bottom: 8px;">
                  <button class="btn btn-sm" :class="resultTab === 'grep' ? 'btn-primary' : 'btn-secondary'"
                          @click="resultTab = 'grep'" x-show="grepMatches.length > 0">
                    📄 Local Files (<span x-text="grepTotal"></span>)
                  </button>
                  <button class="btn btn-sm" :class="resultTab === 'osint' ? 'btn-primary' : 'btn-secondary'"
                          @click="resultTab = 'osint'" x-show="results.length > 0">
                    🌐 OSINT (<span x-text="results.length"></span>)
                  </button>

                  <!-- Actions -->
                  <div style="margin-left:auto;display:flex;gap:8px;" x-show="resultTab === 'grep' && grepMatches.length > 0">
                    <span class="text-xs text-muted" style="align-self:center;">
                      <span x-text="grepFilesScanned"></span> files scanned
                    </span>
                    <button class="btn btn-sm btn-secondary" @click="copyAllResults()">📋 Copy All</button>
                    <button class="btn btn-sm btn-secondary" @click="exportResults()">⬇ Export .txt</button>
                  </div>
                </div>

                <!-- LOCAL GREP RESULTS -->
                <div x-show="resultTab === 'grep'">

                  <!-- Group by file -->
                  <template x-for="group in fileGroups()" :key="group.path">
                    <div class="card mb-2" style="padding:0;overflow:hidden;">

                      <!-- File header -->
                      <div style="background:var(--bg-secondary);padding:8px 14px;border-bottom:1px solid var(--border-color);display:flex;justify-content:space-between;align-items:center;">
                        <div class="flex items-center gap-2">
                          <span style="color:var(--accent-green);font-size:13px;">📄</span>
                          <span class="font-mono text-sm" style="color:var(--text-primary);" x-text="group.name"></span>
                          <span class="badge badge-gray text-xs" x-text="group.lines.length + ' matches'"></span>
                        </div>
                        <span class="text-xs text-muted" x-text="group.path"></span>
                      </div>

                      <!-- Matching lines -->
                      <div style="font-family:'JetBrains Mono',monospace;font-size:12px;">
                        <template x-for="match in group.lines" :key="match.line">
                          <div class="grep-line" style="display:flex;align-items:baseline;padding:4px 14px;border-bottom:1px solid rgba(255,255,255,0.03);">

                            <!-- Line number -->
                            <span style="color:var(--text-muted);min-width:50px;user-select:none;" x-text="match.line + ':'"></span>

                            <!-- Line content with highlight -->
                            <span style="flex:1;word-break:break-all;line-height:1.5;" x-html="highlight(match.text)"></span>

                            <!-- Copy button -->
                            <button class="btn-icon" style="margin-left:8px;opacity:0.6;" @click="copyLine(match.text)" title="Copy line">
                              📋
                            </button>
                          </div>
                        </template>
                      </div>
                    </div>
                  </template>

                  <!-- Truncation notice -->
                  <div x-show="grepTotal >= grepLimit" class="card text-center text-muted text-sm">
                    ⚠️ Results limited to <span x-text="grepLimit"></span>. Increase the limit or use a more specific query.
                  </div>
                </div>

                <!-- OSINT RESULTS -->
                <div x-show="resultTab === 'osint'">
                  <template x-for="(result, i) in results" :key="i">
                    <div class="card mb-2">
                      <div class="flex justify-between items-center" @click="toggleExpand(i)" style="cursor:pointer;">
                        <div class="flex items-center gap-2">
                          <span class="badge" :class="result.source === 'local' ? 'badge-green' : 'badge-blue'" x-text="result.source"></span>
                          <span x-show="result.cached" class="badge badge-gray">cached</span>
                          <span class="text-sm" x-text="result.data?.query || result.data?.domain || result.data?.ip || ''"></span>
                        </div>
                        <span style="color:var(--text-muted);" x-text="expandedResult === i ? '▲' : '▼'"></span>
                      </div>
                      <div x-show="expandedResult === i" style="margin-top:12px;">
                        <div x-show="hasError(result)" class="alert alert-error" x-text="result.data.error"></div>
                        <pre x-show="!hasError(result)" class="code-block" x-text="resultJson(result)"></pre>
                      </div>
                    </div>
                  </template>
                </div>
              </div>

              <!-- Empty state -->
              <div x-show="!loading && grepMatches.length === 0 && results.length === 0 && query" class="card text-center" style="color:var(--text-muted);padding:40px;">
                <div style="font-size:32px;margin-bottom:12px;">🔍</div>
                <div>No results found for "<span x-text="query"></span>"</div>
                <div class="text-xs" style="margin-top:8px;">Try a shorter keyword or check if files are in Watched Folders</div>
              </div>

              <!-- Save Template Modal -->
              <div x-show="showSaveModal" class="modal-overlay" @click.self="showSaveModal = false">
                <div class="modal">
                  <div class="modal-title">Save Search Template</div>
                  <div class="form-group">
                    <label class="form-label">Template Name</label>
                    <input class="form-input" x-model="templateName" placeholder="My Template" />
                  </div>
                  <div class="modal-footer">
                    <button class="btn btn-secondary" @click="showSaveModal = false" x-text="t('cancel')"></button>
                    <button class="btn btn-primary" @click="saveTemplate()" x-text="t('save')"></button>
                  </div>
                </div>
              </div>
            </div>

            <!-- ── FILES ─────────────────────────────────────────── -->
            <div x-show="page === 'files'" x-data="filesPage" x-init="init()">
              <!-- Stats -->
              <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:16px;" x-show="stats">
                <div class="stat-card">
                  <div class="stat-label">Total Files</div>
                  <div class="stat-value" x-text="stats ? stats.total : 0"></div>
                </div>
                <div class="stat-card">
                  <div class="stat-label">Indexed</div>
                  <div class="stat-value text-blue" x-text="stats ? stats.indexed : 0"></div>
                </div>
                <div class="stat-card">
                  <div class="stat-label">Total Size</div>
                  <div class="stat-value" x-text="stats ? formatBytes(stats.total_size) : '0'"></div>
                </div>
              </div>

              <!-- Toolbar -->
              <div class="flex justify-between items-center mb-4">
                <div class="flex gap-2 items-center">
                  <select class="form-select" x-model="selectedProject" @change="page=0;loadFiles()" style="width:160px;">
                    <option value="">All Projects</option>
                    <template x-for="p in projects" :key="p.id">
                      <option :value="p.id" x-text="p.name"></option>
                    </template>
                  </select>
                  <button class="btn btn-secondary" @click="projectModal = true">+ Project</button>
                </div>
                <label class="btn btn-primary" style="cursor:pointer;">
                  <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                  <span x-text="t('upload_file')"></span>
                  <input type="file" style="display:none;" multiple @change="onFileSelect($event)" />
                </label>
              </div>

              <!-- Drop Zone -->
              <div class="drop-zone mb-4"
                   @dragover.prevent="dragging = true"
                   @dragleave="dragging = false"
                   @drop.prevent="onDrop($event)"
                   :class="dragging ? 'dragging' : ''">
                <div class="drop-zone-icon">
                  <svg width="36" height="36" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
                </div>
                <div class="drop-zone-text">
                  <span x-text="t('drop_files')"></span>&nbsp;
                  <label style="color:var(--accent-green);cursor:pointer;">
                    <span x-text="t('browse')"></span>
                    <input type="file" style="display:none;" multiple @change="onFileSelect($event)" />
                  </label>
                </div>
                <div x-show="uploading" class="flex items-center gap-2" style="margin-top:12px;justify-content:center;">
                  <div class="spinner"></div>
                  <span class="text-sm text-muted">Uploading & indexing...</span>
                </div>
              </div>

              <!-- Files Table -->
              <div class="table-wrapper">
                <table>
                  <thead>
                    <tr>
                      <th x-text="t('file_name')"></th>
                      <th x-text="t('file_size')"></th>
                      <th x-text="t('file_type')"></th>
                      <th x-text="t('file_project')"></th>
                      <th x-text="t('file_indexed')"></th>
                      <th x-text="t('file_uploaded')"></th>
                      <th x-text="t('actions')"></th>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-if="loading">
                      <tr><td colspan="7" style="text-align:center;padding:30px;" x-text="t('loading')"></td></tr>
                    </template>
                    <template x-if="!loading && files.length === 0">
                      <tr><td colspan="7" style="text-align:center;padding:30px;color:var(--text-muted);" x-text="t('no_data')"></td></tr>
                    </template>
                    <template x-for="f in files" :key="f.id">
                      <tr>
                        <td>
                          <div class="flex items-center gap-2">
                            <span class="badge badge-gray" x-text="fileExt(f.name)" style="min-width:36px;text-align:center;"></span>
                            <span class="truncate" style="max-width:200px;" x-text="f.original_name"></span>
                          </div>
                        </td>
                        <td x-text="formatBytes(f.size)"></td>
                        <td x-text="f.mime_type || '—'"></td>
                        <td x-text="projectName(f.project_id)"></td>
                        <td>
                          <span :class="f.indexed ? 'badge badge-green' : 'badge badge-gray'"
                                x-text="f.indexed ? '✓' : '—'"></span>
                        </td>
                        <td x-text="formatDate(f.uploaded_at)"></td>
                        <td>
                          <div class="flex gap-2">
                            <button class="btn btn-sm btn-secondary" @click="openEdit(f)">Edit</button>
                            <button class="btn btn-sm btn-secondary" @click="reindex(f.id)" x-text="t('reindex')"></button>
                            <button class="btn btn-sm btn-secondary" @click="download(f.id)" x-text="t('download')"></button>
                            <button class="btn btn-sm btn-danger" @click="deleteFile(f.id)">✕</button>
                          </div>
                        </td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>

              <!-- Edit Modal -->
              <div x-show="editModal" class="modal-overlay" @click.self="editModal = false">
                <div class="modal" x-show="editFile">
                  <div class="modal-title">Edit File</div>
                  <div class="form-group">
                    <label class="form-label" x-text="t('file_name')"></label>
                    <input class="form-input" x-model="editFile.name" />
                  </div>
                  <div class="form-group">
                    <label class="form-label" x-text="t('tags')"></label>
                    <input class="form-input" x-model="editFile.tags" placeholder="tag1, tag2" />
                  </div>
                  <div class="form-group">
                    <label class="form-label" x-text="t('project')"></label>
                    <select class="form-select" x-model="editFile.project_id">
                      <option value="">No project</option>
                      <template x-for="p in projects" :key="p.id">
                        <option :value="p.id" x-text="p.name"></option>
                      </template>
                    </select>
                  </div>
                  <div class="modal-footer">
                    <button class="btn btn-secondary" @click="editModal = false" x-text="t('cancel')"></button>
                    <button class="btn btn-primary" @click="saveEdit()" x-text="t('save')"></button>
                  </div>
                </div>
              </div>

              <!-- Project Modal -->
              <div x-show="projectModal" class="modal-overlay" @click.self="projectModal = false">
                <div class="modal">
                  <div class="modal-title">Create Project</div>
                  <div class="form-group">
                    <label class="form-label">Name</label>
                    <input class="form-input" x-model="newProjectName" placeholder="Project name" />
                  </div>
                  <div class="form-group">
                    <label class="form-label" x-text="t('description')"></label>
                    <input class="form-input" x-model="newProjectDesc" placeholder="Description" />
                  </div>
                  <div class="modal-footer">
                    <button class="btn btn-secondary" @click="projectModal = false" x-text="t('cancel')"></button>
                    <button class="btn btn-primary" @click="createProject()" x-text="t('save')"></button>
                  </div>
                </div>
              </div>
            </div>


            <!-- ── CVE SEARCH ─────────────────────────────────────── -->
            <div x-show="page === 'cve'" x-data="cvePage" x-init="init()">

              <div class="card mb-4">
                <div class="card-title">CVE / Vulnerability Search</div>
                <p class="text-sm text-muted" style="margin-bottom:16px;">
                  Search NIST NVD CVE database. Results are fetched via backend proxy.
                </p>

                <div class="search-bar">
                  <div class="search-input-wrap" style="flex:1;">
                    <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                    <input class="form-input" type="text" x-model="query"
                           placeholder="CVE-2024-1234 or keyword: log4j, apache, openssl..."
                           @keyup.enter="search()" />
                  </div>
                  <select class="form-select" x-model="searchType" style="width:160px;">
                    <option value="cve_id">CVE ID</option>
                    <option value="keyword">Keyword</option>
                    <option value="product">Product/Vendor</option>
                  </select>
                  <select class="form-select" x-model="severity" style="width:140px;">
                    <option value="">All Severity</option>
                    <option value="CRITICAL">Critical</option>
                    <option value="HIGH">High</option>
                    <option value="MEDIUM">Medium</option>
                    <option value="LOW">Low</option>
                  </select>
                  <button class="btn btn-primary" @click="search()" :disabled="loading">
                    <span x-show="loading" class="spinner" style="width:14px;height:14px;"></span>
                    <span x-text="loading ? 'Searching...' : 'Search CVE'"></span>
                  </button>
                </div>

                <!-- Quick searches -->
                <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">
                  <span class="text-xs text-muted">Quick:</span>
                  <template x-for="q in quickSearches" :key="q">
                    <button class="btn btn-sm btn-secondary" @click="query=q; searchType='keyword'; search()" x-text="q"></button>
                  </template>
                </div>
              </div>

              <!-- Stats bar -->
              <div x-show="totalResults > 0" class="flex items-center gap-4 mb-4" style="color:var(--text-muted);font-size:13px;">
                <span>Found: <span class="text-green" x-text="totalResults"></span> CVEs</span>
                <span x-show="searchTime">Search time: <span x-text="searchTime + 'ms'"></span></span>
              </div>

              <!-- Results -->
              <div x-show="results.length > 0">
                <template x-for="cve in results" :key="cve.id">
                  <div class="card mb-2" style="border-left:3px solid var(--border-color);"
                       :style="severityBorder(cve.severity)">
                    <div class="flex justify-between items-start mb-2">
                      <div>
                        <span class="font-mono" style="font-size:15px;font-weight:600;color:var(--accent-green);" x-text="cve.id"></span>
                        <span class="badge" :class="severityClass(cve.severity)" x-text="cve.severity || 'N/A'" style="margin-left:8px;"></span>
                        <span class="badge badge-gray" x-show="cve.cvss_score" x-text="'CVSS: ' + cve.cvss_score" style="margin-left:4px;"></span>
                      </div>
                      <div class="flex gap-2">
                        <span class="text-xs text-muted" x-text="cve.published ? new Date(cve.published).toLocaleDateString() : ''"></span>
                        <a :href="'https://nvd.nist.gov/vuln/detail/' + cve.id" target="_blank" class="btn btn-sm btn-secondary">NVD ↗</a>
                      </div>
                    </div>
                    <div class="text-sm" style="line-height:1.6;margin-bottom:8px;" x-text="cve.description"></div>
                    <div x-show="cve.products && cve.products.length > 0" style="margin-top:8px;">
                      <span class="text-xs text-muted">Affected: </span>
                      <template x-for="p in (cve.products || []).slice(0,5)" :key="p">
                        <span class="badge badge-gray" style="margin-right:4px;" x-text="p"></span>
                      </template>
                    </div>
                    <div x-show="cve.references && cve.references.length > 0" style="margin-top:8px;">
                      <span class="text-xs text-muted">References: </span>
                      <template x-for="ref in (cve.references || []).slice(0,3)" :key="ref">
                        <a :href="ref" target="_blank" class="text-xs" style="color:var(--accent-blue);margin-right:8px;word-break:break-all;" x-text="ref.length > 60 ? ref.substring(0,60) + '...' : ref"></a>
                      </template>
                    </div>
                  </div>
                </template>
              </div>

              <!-- No results -->
              <div x-show="!loading && searched && results.length === 0" class="card text-center" style="color:var(--text-muted);">
                No CVEs found for "<span x-text="query"></span>"
              </div>

              <!-- Error -->
              <div x-show="error" class="alert alert-error" x-text="error"></div>
            </div>

            <!-- ── INTEGRATIONS ───────────────────────────────────── -->
            <div x-show="page === 'integrations'" x-data="integrationsPage" x-init="init()">
              <div class="flex justify-between items-center mb-4">
                <div></div>
                <button class="btn btn-primary" @click="showModal = true" x-text="t('add_integration')"></button>
              </div>

              <!-- Services overview -->
              <div class="card mb-4">
                <div class="card-title">Available Services</div>
                <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;">
                  <template x-for="svc in services" :key="svc.type">
                    <div style="border:1px solid var(--border-color);border-radius:6px;padding:12px;cursor:pointer;transition:all 0.2s;"
                         :style="!notConfigured(svc) ? 'border-color:var(--accent-green);' : ''"
                         @click="showModal = true; selectService(svc)">
                      <div class="text-sm font-mono" style="font-weight:600;" x-text="svc.name"></div>
                      <div class="text-xs text-muted" x-text="svc.type"></div>
                      <div style="margin-top:6px;">
                        <span :class="notConfigured(svc) ? 'badge badge-gray' : 'badge badge-green'"
                              x-text="notConfigured(svc) ? 'Not configured' : 'Configured'"></span>
                      </div>
                    </div>
                  </template>
                </div>
              </div>

              <!-- Configured integrations table -->
              <div class="table-wrapper">
                <table>
                  <thead>
                    <tr>
                      <th>Name</th>
                      <th x-text="t('service')"></th>
                      <th x-text="t('status')"></th>
                      <th>Rate Limit</th>
                      <th x-text="t('created_at')"></th>
                      <th x-text="t('actions')"></th>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-if="integrations.length === 0">
                      <tr><td colspan="6" style="text-align:center;padding:30px;color:var(--text-muted);" x-text="t('no_data')"></td></tr>
                    </template>
                    <template x-for="i in integrations" :key="i.id">
                      <tr>
                        <td x-text="i.name"></td>
                        <td><span class="badge badge-blue" x-text="i.service_type"></span></td>
                        <td>
                          <span :class="i.is_active ? 'badge badge-green' : 'badge badge-gray'"
                                x-text="i.is_active ? t('active') : t('inactive')"></span>
                        </td>
                        <td x-text="i.rate_limit + '/min'"></td>
                        <td x-text="formatDate(i.created_at)"></td>
                        <td>
                          <div class="flex gap-2">
                            <button class="btn btn-sm btn-secondary" @click="openEdit(i)">Edit</button>
                            <button class="btn btn-sm btn-secondary" @click="testIntegration(i.id)" x-text="t('test')"></button>
                            <button class="btn btn-sm btn-secondary" @click="openQuery(i.id)" x-text="t('query')"></button>
                            <button class="btn btn-sm btn-danger" @click="deleteIntegration(i.id)">✕</button>
                          </div>
                        </td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>

              <!-- Test result -->
              <div x-show="testResult" class="card mt-4">
                <div class="card-title">Test Result</div>
                <div :class="testResult && testResult.ok ? 'alert alert-success' : 'alert alert-error'"
                     x-text="testResult && testResult.ok ? 'API key valid ✓' : 'API key invalid or error'"></div>
                <div class="json-viewer" x-text="formatJSON(testResult)"></div>
              </div>

              <!-- Add Modal -->
              <div x-show="showModal" class="modal-overlay" @click.self="showModal = false">
                <div class="modal">
                  <div class="modal-title" x-text="t('add_integration')"></div>
                  <div class="form-group">
                    <label class="form-label">Service</label>
                    <select class="form-select" x-model="newIntegration.service_type" @change="selectService(services.find(s=>s.type===newIntegration.service_type)||{})">
                      <option value="">Select service...</option>
                      <template x-for="svc in services" :key="svc.type">
                        <option :value="svc.type" x-text="svc.name"></option>
                      </template>
                    </select>
                  </div>
                  <div class="form-group">
                    <label class="form-label">Display Name</label>
                    <input class="form-input" x-model="newIntegration.name" placeholder="My HIBP" />
                  </div>
                  <div class="form-group">
                    <label class="form-label" x-text="t('api_key')"></label>
                    <input class="form-input" type="password" x-model="newIntegration.api_key" placeholder="Enter API key" autocomplete="off" />
                  </div>
                  <div class="grid-2">
                    <div class="form-group">
                      <label class="form-label">Rate Limit (req/min)</label>
                      <input class="form-input" type="number" x-model="newIntegration.rate_limit" />
                    </div>
                    <div class="form-group">
                      <label class="form-label">Cache TTL (seconds)</label>
                      <input class="form-input" type="number" x-model="newIntegration.cache_ttl" />
                    </div>
                  </div>
                  <div class="modal-footer">
                    <button class="btn btn-secondary" @click="showModal = false" x-text="t('cancel')"></button>
                    <button class="btn btn-primary" @click="createIntegration()" x-text="t('save')"></button>
                  </div>
                </div>
              </div>

              <!-- Edit Modal -->
              <div x-show="editModal" class="modal-overlay" @click.self="editModal = false">
                <div class="modal" x-show="editIntegration">
                  <div class="modal-title">Edit Integration</div>
                  <div class="form-group">
                    <label class="form-label">Name</label>
                    <input class="form-input" x-model="editIntegration.name" />
                  </div>
                  <div class="form-group">
                    <label class="form-label" x-text="t('api_key') + ' (leave empty to keep current)'"></label>
                    <input class="form-input" type="password" x-model="editIntegration.api_key" placeholder="Enter new API key or leave empty" autocomplete="off" />
                  </div>
                  <div class="form-group">
                    <label class="form-label">Active</label>
                    <input type="checkbox" x-model="editIntegration.is_active" />
                  </div>
                  <div class="modal-footer">
                    <button class="btn btn-secondary" @click="editModal = false" x-text="t('cancel')"></button>
                    <button class="btn btn-primary" @click="saveEdit()" x-text="t('save')"></button>
                  </div>
                </div>
              </div>

              <!-- Query Modal -->
              <div x-show="showQueryModal" class="modal-overlay" @click.self="showQueryModal = false">
                <div class="modal">
                  <div class="modal-title">Query Integration</div>
                  <div class="form-group">
                    <label class="form-label">Query</label>
                    <input class="form-input" x-model="queryForm.query" placeholder="Enter query..." @keyup.enter="runQuery()" />
                  </div>
                  <div class="form-group">
                    <label class="form-label" x-text="t('query_type')"></label>
                    <select class="form-select" x-model="queryForm.query_type">
                      <template x-for="qt in queryTypes" :key="qt">
                        <option :value="qt" x-text="qt"></option>
                      </template>
                    </select>
                  </div>
                  <button class="btn btn-primary" @click="runQuery()" :disabled="queryLoading">
                    <span x-show="queryLoading" class="spinner" style="width:14px;height:14px;"></span>
                    <span x-text="queryLoading ? t('loading') : t('search_btn')"></span>
                  </button>
                  <div x-show="queryResult" class="json-viewer" style="margin-top:12px;" x-text="queryResultJson()"></div>
                </div>
              </div>
            </div>

            <!-- ── MONITORING ─────────────────────────────────────── -->
            <div x-show="page === 'monitoring'" x-data="monitoringPage" x-init="init()">
              <div class="flex justify-between items-center mb-4">
                <div></div>

                            <span x-show="alert.similarity_pct != null"

            <div x-show="page === 'watchlist'" x-data="{
              items: [], integrations: [], loading: false, showModal: false,
              checkResult: null, checkLoading: false,
              newItem: { type: 'email', value: '', integrations_json: '[]', alert_email: '', alert_telegram: '' },
              itemTypes: ['email', 'domain', 'ip', 'keyword', 'brand'],
              async init() {
                await this.load();
                try { const i = await api.get('/integrations/'); this.integrations = i.filter(x=>x.is_active); } catch {}
              },
              async load() {
                this.loading = true;
                try { this.items = await api.get('/watchlist/'); } catch(e){ showToast(e.message,'error'); } finally { this.loading = false; }
              },
              async create() {
                try {
                  this.newItem.integrations_json = JSON.stringify(this.selectedIntegrations || []);
                  await api.post('/watchlist/', this.newItem);
                  await this.load(); this.showModal = false;
                  this.newItem = { type: 'email', value: '', integrations_json: '[]', alert_email: '', alert_telegram: '' };
                  showToast('Added', 'success');
                } catch(e) { showToast(e.message,'error'); }
              },
              async checkItem(id) {
                this.checkLoading = true; this.checkResult = null;
                try { this.checkResult = await api.post('/watchlist/' + id + '/check'); showToast('Check complete','success'); }
                catch(e) { showToast(e.message,'error'); } finally { this.checkLoading = false; }
              },
              async deleteItem(id) {
                if(!confirm(t('confirm_delete'))) return;
                try { await api.delete('/watchlist/' + id); this.items = this.items.filter(i=>i.id!==id); showToast('Deleted','success'); }
                catch(e) { showToast(e.message,'error'); }
              },
              selectedIntegrations: [],
              toggleInteg(t) { const i=this.selectedIntegrations.indexOf(t); if(i>=0) this.selectedIntegrations.splice(i,1); else this.selectedIntegrations.push(t); },
            }">

                      <th x-text="t('actions')"></th>

                  </thead>

                this.loading = true;
                try { this.notifications = await api.get('/dashboard/notifications?limit=100'); }
                catch(e) { showToast(e.message,'error'); } finally { this.loading = false; }
              },
              async markRead(id) {
                try { await api.post('/dashboard/notifications/' + id + '/read'); await this.load(); }
                catch(e) {}
              },
              async markAllRead() {
                try { await api.post('/dashboard/notifications/read-all'); await this.load(); showToast('All marked as read','success'); }
                catch(e) { showToast(e.message,'error'); }
              },
              typeClass(type) { const m={info:'badge-blue',success:'badge-green',error:'badge-red',warning:'badge-yellow'}; return m[type]||'badge-gray'; },
            }">

                            <td x-text="f.created_at ? f.created_at.substring(0,10) : '—'"></td>

                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>

                <!-- Tree view -->

                    <span>File Tree</span>
                    <span x-show="treeLoading" class="spinner" style="width:14px;height:14px;"></span>

                      <template x-for="child in (treeData.children || [])" :key="child.name">
                        <div x-data="{ node: child }">
                          <template x-if="node.type==='directory'">
                            <div>
                              <div class="flex items-center gap-1 cursor-pointer" style="padding:3px 0;"
                                   @click="toggleNode(node.name)">
                                <span x-text="isCollapsed(node.name) ? '▶' : '▼'" style="color:var(--text-muted);font-size:10px;"></span>
                                <span>📁</span>
                                <span class="text-green" x-text="node.name"></span>
                                <span class="badge badge-gray text-xs" x-text="(node.children||[]).length + ' items'"></span>
                                <button class="btn btn-sm btn-danger" style="margin-left:auto;padding:1px 6px;"
                                        @click.stop="deleteFolder(node.name)">🗑</button>
                              </div>
                              <div x-show="!isCollapsed(node.name)" style="padding-left:20px;">
                                <template x-for="sub in (node.children||[])" :key="sub.name + sub.path">
                                  <div>
                                    <template x-if="sub.type==='file'">
                                      <div class="flex items-center gap-1 cursor-pointer grep-line"
                                           style="padding:2px 0;" @click="openFile(sub.path)">

                                        <span x-text="sub.name" style="color:var(--text-primary);"></span>
                                        <span class="text-xs text-muted" x-text="formatSize(sub.size)"></span>
                                      </div>
                                    </template>
                                    <template x-if="sub.type==='directory'">
                                      <div>
                                        <div class="flex items-center gap-1 cursor-pointer" style="padding:2px 0;"
                                             @click="toggleNode(node.name+'/'+sub.name)">
                                          <span x-text="isCollapsed(node.name+'/'+sub.name) ? '▶' : '▼'" style="color:var(--text-muted);font-size:10px;"></span>
                                          <span>📁</span>
                                          <span class="text-green" x-text="sub.name"></span>
                                        </div>
                                        <div x-show="!isCollapsed(node.name+'/'+sub.name)" style="padding-left:20px;">

                                              <span x-show="leaf.type==='file'" class="text-xs text-muted" x-text="formatSize(leaf.size)"></span>
                                            </div>
                                          </template>
                                        </div>
                                      </div>
                                    </template>
                                  </div>
                                </template>
                              </div>
                            </div>

                <!-- Results -->
                <template x-for="result in searchResults" :key="result.file_path">
                  <div class="card mb-2" style="padding:0;overflow:hidden;">
                    <div style="background:var(--bg-secondary);padding:8px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border-color);">
                      <div class="flex items-center gap-2 cursor-pointer" @click="toggleResultExpand(result.file_path)">
                        <span style="color:var(--text-muted);font-size:10px;" x-text="isResultExpanded(result.file_path) ? '▼' : '▶'"></span>
                        <span>📄</span>
                        <span class="font-mono text-sm text-green" x-text="result.file_name"></span>
                        <span class="badge badge-gray text-xs" x-text="result.match_count + ' matches'"></span>
                      </div>
                      <div class="flex gap-2 items-center">
                        <span class="text-xs text-muted truncate" x-text="result.file_path" style="max-width:200px;"></span>
                        <button class="btn btn-sm btn-secondary" @click="openFileFromSearch(result.file_path)">Open</button>
                      </div>
                    </div>
                    <div x-show="isResultExpanded(result.file_path)" style="font-family:'JetBrains Mono',monospace;font-size:12px;">
                      <template x-for="m in result.matches" :key="m.line + m.text">
                        <div class="grep-line" style="display:flex;gap:8px;padding:4px 14px;border-bottom:1px solid rgba(255,255,255,0.03);">
                          <span style="color:var(--text-muted);min-width:50px;" x-text="m.line > 0 ? m.line + ':' : '[name]'"></span>
                          <span style="flex:1;word-break:break-all;" x-html="highlightMatch(m.text)"></span>
                        </div>
                      </template>
                    </div>
                  </div>
                </template>

                <template x-if="searchResults.length === 0 && searchStats !== null">
                  <div class="card text-center" style="color:var(--text-muted);padding:40px;">
                    <div style="font-size:32px;margin-bottom:12px;">🔍</div>
                    <div>No results found for "<span x-text="searchQuery"></span>"</div>
                  </div>
                </template>
              </div><!-- /search tab -->

              <!-- ── TAB: File Viewer ── -->
              <div x-show="activeTab==='viewer'">
                <template x-if="viewerLoading">
                  <div class="card text-muted text-sm text-center" style="padding:40px;">Loading file...</div>
                </template>
                <template x-if="!viewerLoading && !viewerFile">
                  <div class="card text-muted text-sm text-center" style="padding:40px;">
                    <div style="font-size:32px;margin-bottom:12px;">📄</div>
                    <div>Click a file in the tree to view its contents</div>
                  </div>
                </template>
                <template x-if="!viewerLoading && viewerFile">
                  <div>
                    <!-- Breadcrumbs -->
                    <div class="flex items-center gap-1 mb-3 text-sm" style="flex-wrap:wrap;">
                      <template x-for="(crumb, i) in viewerBreadcrumbs()" :key="crumb + i">
                        <span>
                          <span x-show="i > 0" style="color:var(--text-muted);"> › </span>
                          <span :style="i === viewerBreadcrumbs().length - 1 ? 'color:var(--accent-green)' : 'color:var(--text-muted)'"
                                x-text="crumb"></span>
                        </span>
                      </template>
                    </div>

                    <!-- File meta -->
                    <div class="card mb-3" style="padding:10px 14px;">
                      <div class="flex gap-4 flex-wrap text-sm">
                        <span><span class="text-muted">Name:</span> <span class="text-green" x-text="viewerFile.path.split('/').pop()"></span></span>
                        <span><span class="text-muted">Size:</span> <span x-text="formatSize(viewerFile.size)"></span></span>
                        <span x-show="viewerFile.ext"><span class="text-muted">Ext:</span> <span x-text="viewerFile.ext"></span></span>
                        <span x-show="!viewerFile.binary && viewerFile.lines_total"><span class="text-muted">Lines:</span> <span x-text="viewerFile.lines_total"></span></span>
                        <span x-show="viewerFile.truncated" class="badge badge-gray">Truncated (500 lines)</span>
                      </div>
                    </div>

                    <!-- Actions -->
                    <div class="flex gap-2 mb-3">
                      <button class="btn btn-secondary btn-sm" @click="copyViewerContent()" x-show="!viewerFile.binary">
                        <span x-text="viewerCopied ? '✅ Copied' : '📋 Copy'"></span>
                      </button>
                      <button class="btn btn-secondary btn-sm" @click="searchInThisFile()">🔍 Search in this file</button>
                    </div>

                    <!-- Binary notice -->
                    <template x-if="viewerFile.binary">
                      <div class="card text-muted text-sm text-center" style="padding:30px;">
                        [Binary file — preview not available] Size: <span x-text="formatSize(viewerFile.size)"></span>
                      </div>
                    </template>

                    <!-- CSV table -->
                    <template x-if="!viewerFile.binary && isCSV()">
                      <div class="card" style="overflow-x:auto;max-height:500px;">
                        <table class="table" style="font-size:12px;">
                          <tbody>
                            <template x-for="(row, ri) in csvRows()" :key="ri">
                              <tr>
                                <template x-for="(cell, ci) in row" :key="ci">
                                  <td x-text="cell"></td>
                                </template>
                              </tr>
                            </template>
                          </tbody>
                        </table>
                      </div>
                    </template>

                    <!-- Text/JSON content -->
                    <template x-if="!viewerFile.binary && !isCSV()">
                      <div class="card" style="overflow:auto;max-height:600px;padding:0;">
                        <pre class="code-block" style="margin:0;white-space:pre-wrap;word-break:break-all;font-size:12px;"
                             x-text="renderFileContent()"></pre>
                      </div>
                    </template>
                  </div>
                </template>
              </div><!-- /viewer tab -->

            </div><!-- /deep-search -->

          </div><!-- /page-content (moved closing tag) -->
        </main>
      </div>
    </template>
  </div><!-- /app -->

  <script>
    // Initialize Lucide icons after page load
    window.addEventListener('load', () => {
      if (window.lucide) lucide.createIcons();
    });
  </script>
</body>
</html>
